name: CI

# --- Quand ce workflow se déclenche-t-il ? ---
# À chaque push sur main, et à chaque pull request visant main.
# Ça permet de vérifier le code aussi bien après un merge que AVANT
# (dans une PR), pour éviter d'introduire du code cassé dans main.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --- Job 1 : installation des dépendances + linter ---
  install-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du repo
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm install

      - name: Lancer le linter (ESLint)
        run: npm run lint

  # --- Job 2 : build / vérification de syntaxe ---
  build:
    runs-on: ubuntu-latest
    needs: install-and-lint   # ce job attend que le job précédent réussisse
    steps:
      - name: Récupérer le code du repo
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm install

      - name: Vérifier l'absence d'erreurs (build check)
        run: npm run build
